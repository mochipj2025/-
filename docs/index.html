<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臨床アーカイブ辞書 | M.O.C.H.I. LABO</title>
  
  <!-- SEO & OGP -->
  <meta name="description" content="臨床家・もちスラによる 15 年の知見。28 項目の専門用語を検索・閲覧可能なデジタルアーカイブです。">
  <meta property="og:title" content="🔬 臨床アーカイブ辞書 | M.O.C.H.I. LABO">
  <meta property="og:description" content="28 項目の臨床知見を高速検索。臨床の武器としてご活用ください。">
  <meta property="og:image" content="https://raw.githubusercontent.com/YayanV/Mochi-Labo/main/rich_menu_upload.jpg">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg: #010409;
      --sidebar: #0d1117;
      --card: #161b22;
      --accent: #06C755;
      --text: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --glass: rgba(13, 17, 23, 0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar Layout */
    .sidebar {
      width: 320px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 16px;
      display: block;
      text-decoration: none;
    }

    .search-container {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
    }

    .term-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .term-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .term-item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--accent);
    }

    .term-item.active {
      background: rgba(6, 199, 85, 0.1);
      color: var(--accent);
      font-weight: 700;
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .main-header {
      padding: 16px 40px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
    }

    .article-container {
      flex: 1;
      overflow-y: auto;
      padding: 60px 40px 120px;
      display: flex;
      justify-content: center;
    }

    .article-card {
      max-width: 720px;
      width: 100%;
    }

    .article-header {
      margin-bottom: 48px;
    }

    .category-badge {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(6, 199, 85, 0.1);
      border: 1px solid rgba(6, 199, 85, 0.2);
      border-radius: 100px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .article-title {
      font-family: 'Outfit', sans-serif;
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
      color: #fff;
    }

    /* Markdown Styles */
    .content-body h2 { font-size: 24px; margin: 40px 0 16px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .content-body p { margin-bottom: 20px; }
    .content-body strong { color: #fff; }
    .content-body ul { margin-left: 20px; margin-bottom: 24px; }
    .content-body li { margin-bottom: 8px; }
    .content-body blockquote {
      border-left: 4px solid var(--accent);
      padding: 12px 24px;
      background: rgba(255,255,255,0.03);
      margin: 24px 0;
      font-style: italic;
      color: var(--muted);
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--muted);
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        left: -320px;
        z-index: 100;
        height: 100%;
      }
      .sidebar.open {
        left: 0;
      }
      .mobile-menu-btn {
        display: block;
      }
      .main-header {
        padding: 16px 20px;
      }
      .article-container {
        padding: 40px 20px;
      }
      .article-title {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="brand">M.O.C.H.I. LABO</a>
      <div class="search-container">
        <input type="text" class="search-input" id="search-input" placeholder="用語を検索...">
      </div>
    </div>
    <div class="term-list" id="term-list">
      <!-- List items injected here -->
    </div>
  </aside>

  <main class="main-content">
    <header class="main-header">
      <button class="mobile-menu-btn" id="menu-btn">≡</button>
      <div id="header-title" style="font-weight: 700; color: var(--accent);">Archives</div>
      <div style="font-size: 12px; color: var(--muted);">2026 Edition</div>
    </header>

    <section class="article-container" id="article-container">
      <!-- Article injected here -->
      <div class="placeholder">
        <h2 style="font-size: 24px; margin-bottom: 8px;">🔬 臨床辞典 A-Z</h2>
        <p>調べたい用語を検索、または左のリストから選択してください</p>
      </div>
    </section>
  </main>

  <script>
    let glossaryData = [];
    const searchInput = document.getElementById('search-input');
    const termList = document.getElementById('term-list');
    const articleContainer = document.getElementById('article-container');
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menu-btn');

    // Load Data
    async function init() {
      try {
        const response = await fetch('./glossary_db.json');
        glossaryData = await response.json();
        glossaryData.sort((a, b) => a.title.localeCompare(b.title, 'ja'));
        renderList(glossaryData);
        
        // Handle direct links
        const hash = window.location.hash.slice(1);
        if (hash) {
          const item = glossaryData.find(d => d.slug === hash);
          if (item) renderArticle(item);
        }
      } catch (err) {
        console.error('Failed to load glossary data:', err);
      }
    }

    function renderList(data) {
      termList.innerHTML = '';
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'term-item';
        div.textContent = item.title;
        div.onclick = () => {
          renderArticle(item);
          if (window.innerWidth <= 768) sidebar.classList.remove('open');
        };
        termList.appendChild(div);
      });
    }

    async function renderArticle(item) {
      // Update UI active state
      document.querySelectorAll('.term-item').forEach(el => {
        el.classList.toggle('active', el.textContent === item.title);
      });

      // Update URL
      window.location.hash = item.slug;

      const html = `
        <div class="article-card">
          <div class="article-header">
            <span class="category-badge">Clinical Archive</span>
            <h1 class="article-title">${item.title}</h1>
          </div>
          <div class="content-body">
            ${marked.parse(item.content)}
          </div>
        </div>
      `;
      articleContainer.innerHTML = html;
      articleContainer.scrollTop = 0;
    }

    // Search Logic
    searchInput.oninput = (e) => {
      const val = e.target.value.toLowerCase();
      const filtered = glossaryData.filter(d => 
        d.title.toLowerCase().includes(val) || 
        d.content.toLowerCase().includes(val) ||
        (d.metadata.aliases && d.metadata.aliases.some(a => a.toLowerCase().includes(val)))
      );
      renderList(filtered);
    };

    // Mobile Menu
    menuBtn.onclick = () => sidebar.classList.toggle('open');

    init();
  </script>
</body>
</html>
