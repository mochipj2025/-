<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臨床アーカイブ | M.O.C.H.I. LABO -  Sociology of Relaxation</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #010409;
      --surface: #0d1117;
      --card: rgba(22, 27, 34, 0.4);
      --accent: #06C755;
      --text: #e6edf3;
      --muted: #8b949e;
      --border: rgba(48, 54, 61, 0.5);
      --glass: rgba(1, 4, 9, 0.8);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* Animated background */
    .bg-mesh {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, #0d1117 0%, #010409 100%);
      z-index: -1;
    }
    .bg-glow {
      position: fixed;
      top: -20%; left: -10%; width: 60%; height: 60%;
      background: radial-gradient(circle, rgba(6, 199, 85, 0.05) 0%, transparent 70%);
      filter: blur(100px);
      z-index: -1;
    }

    /* Hero Section */
    .hero {
      padding: 120px 24px 80px;
      text-align: center;
      max-width: 1000px;
      margin: 0 auto;
    }

    .badge-premium {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(6, 199, 85, 0.1);
      border: 1px solid var(--accent);
      border-radius: 100px;
      color: var(--accent);
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1.0;
      margin-bottom: 32px;
      color: #fff;
    }

    .hero p {
      font-size: 20px;
      color: var(--muted);
      max-width: 700px;
      margin: 0 auto 48px;
    }

    /* Search Bar */
    .search-wrapper {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 20px 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: #fff;
      font-size: 18px;
      backdrop-filter: blur(20px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(6, 199, 85, 0.15);
      background: rgba(22, 27, 34, 0.8);
    }

    /* Archive Grid */
    .grid-container {
      max-width: 1200px;
      margin: 80px auto 160px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .archive-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      text-decoration: none;
      color: inherit;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .archive-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s;
    }

    .archive-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      background: rgba(48, 54, 61, 0.3);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .archive-card:hover::before {
      transform: scaleX(1);
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 10px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    /* Footer / CTA */
    .footer {
      padding: 120px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .cta-button {
      display: inline-block;
      padding: 20px 48px;
      background: var(--accent);
      color: #000;
      text-decoration: none;
      font-weight: 900;
      border-radius: 100px;
      font-size: 18px;
      transition: transform 0.2s;
    }

    .cta-button:hover {
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 48px; }
      .grid-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>
  <div class="bg-glow"></div>

  <section class="hero">
    <div class="badge-premium">Science x Sociology</div>
    <h1>Archives of<br>Clinical Wisdom</h1>
    <p>
      臨床家「もちスラ」による、15 年の現場経験と科学的エビデンスの結晶。<br>
      28 項目の専門用語を通じて、心身のメカニズムを深く解凍します。
    </p>
    
    <div class="search-wrapper">
      <input type="text" id="search-input" class="search-input" placeholder="用語、キーワード、効果で検索...">
    </div>
  </section>

  <div class="grid-container" id="archive-grid">
    <!-- Cards will be injected here -->
  </div>

  <footer class="footer">
    <h2 style="font-family: 'Outfit'; font-size: 32px; margin-bottom: 24px;">Deepen Your Practice.</h2>
    <p style="color: var(--muted); margin-bottom: 48px;">最新の市場レポート、限定アーカイブ、コミュニティへのアクセスは LINE から。</p>
    <a href="https://note.com/mochisuranote/membership" class="cta-button">Join M.O.C.H.I. LABO</a>
    <div style="margin-top: 80px; color: var(--border); font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">
      &copy; 2026 Sociology of Relaxation | M.O.C.H.I. LABO
    </div>
  </footer>

  <script>
    let archiveData = [];
    const searchInput = document.getElementById('search-input');
    const archiveGrid = document.getElementById('archive-grid');

    async function loadData() {
      try {
        const response = await fetch('./glossary_db.json');
        archiveData = await response.json();
        archiveData.sort((a, b) => a.title.localeCompare(b.title, 'ja'));
        renderGrid(archiveData);
      } catch (err) {
        console.error('Failed to load archives:', err);
      }
    }

    function renderGrid(data) {
      archiveGrid.innerHTML = '';
      data.forEach(item => {
        const card = document.createElement('a');
        card.className = 'archive-card';
        card.href = `./archive/${item.slug}.html`;
        
        // Extract some tags from metadata if exists
        const tagsHtml = item.metadata.tags ? 
          item.metadata.tags.slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('') :
          `<span class="tag">Clinical</span><span class="tag">Insight</span>`;

        card.innerHTML = `
          <div class="card-title">${item.title}</div>
          <div class="card-tags">${tagsHtml}</div>
        `;
        archiveGrid.appendChild(card);
      });
    }

    searchInput.oninput = (e) => {
      const val = e.target.value.toLowerCase();
      const filtered = archiveData.filter(d => 
        d.title.toLowerCase().includes(val) || 
        d.content.toLowerCase().includes(val) ||
        (d.metadata.aliases && d.metadata.aliases.some(a => a.toLowerCase().includes(val)))
      );
      renderGrid(filtered);
    };

    loadData();
  </script>
</body>
</html>
